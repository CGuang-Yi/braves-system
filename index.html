<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cougar Company Data System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{--bg:#0D1117;--surface:#161B22;--surface2:#21262D;--border:#30363D;--text:#E6EDF3;--muted:#8B949E;--dim:#484F58;--accent:#58A6FF;--accentDim:#1F6FEB;--green:#3FB950;--red:#F85149;--orange:#D29922;--yellow:#E3B341;--purple:#BC8CFF;--teal:#39D2C0;--pink:#F778BA}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;display:flex;height:100vh;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}

/* Sidebar */
#sidebar{width:190px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#sidebar .logo{padding:14px 12px;border-bottom:1px solid var(--border)}
#sidebar .logo small{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
#sidebar .logo h2{font-size:14px;margin-top:2px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border:none;cursor:pointer;background:transparent;color:var(--muted);font:inherit;font-size:12px;text-align:left;border-left:2px solid transparent;transition:all .15s;width:100%}
.nav-btn:hover{background:var(--surface2)}
.nav-btn.active{background:var(--surface2);color:var(--accent);font-weight:600;border-left-color:var(--accent)}
#sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border);font-size:10px;color:var(--dim)}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;gap:10px;align-items:center}
#topbar input{flex:1;max-width:350px;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font:inherit;font-size:12px;outline:none}
#content{flex:1;padding:20px;overflow-y:auto}

/* Components */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;flex:1;min-width:120}
.stat label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.stat .val{font-size:22px;font-weight:700;margin-top:2px;font-family:'JetBrains Mono',monospace}
.stat .sub{font-size:10px;color:var(--muted);margin-top:1px}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.badge-green{background:#3FB95022;color:var(--green);border:1px solid #3FB95044}
.badge-red{background:#F8514922;color:var(--red);border:1px solid #F8514944}
.badge-orange{background:#D2992222;color:var(--orange);border:1px solid #D2992244}
.badge-yellow{background:#E3B34122;color:var(--yellow);border:1px solid #E3B34144}
.badge-purple{background:#BC8CFF22;color:var(--purple);border:1px solid #BC8CFF44}
.badge-accent{background:#58A6FF22;color:var(--accent);border:1px solid #58A6FF44}

.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;border:1px solid var(--border);background:var(--surface2);color:var(--text)}
.btn:hover{filter:brightness(1.2)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accentDim);border-color:var(--accent)}
.btn-success{background:#23863644;color:var(--green);border-color:#3FB95044}
.btn-danger{background:#DA363322;color:var(--red);border-color:#F8514944}

table{width:100%;border-collapse:collapse}
th{padding:8px 10px;background:var(--surface2);color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0}
td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;font-size:12px}
tr:hover{background:var(--surface2)}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);max-height:60vh;overflow-y:auto}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.card h3{font-size:13px;color:var(--muted);margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Forms */
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:12px;outline:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.hidden{display:none!important}

/* Sync */
.sync-panel{background:var(--surface);border:1px solid #58A6FF44;border-radius:8px;padding:20px;margin-bottom:20px}
.sync-log{max-height:160px;overflow-y:auto;font-size:11px;font-family:'JetBrains Mono',monospace}
.sync-log div{padding:2px 0;border-bottom:1px solid var(--border)}

@media(max-width:768px){
  #sidebar{width:60px}
  .nav-btn span:last-child{display:none}
  .grid-2{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="sidebar">

  </div>
  <button class="nav-btn active" data-nav="dashboard"><span>📊</span><span>Dashboard</span></button>

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// LOCAL PERSISTENCE
// ═══════════════════════════════════════════════════════
function saveLocal() {
  const d = {roster:STATE.roster,medical:STATE.medical,attendance:STATE.attendance,ippt:STATE.ippt,rm:STATE.rm,soc:STATE.soc,polar:STATE.polar};
  localStorage.setItem("cougar-data", JSON.stringify(d));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem("cougar-data");
    if (raw) {
      const d = JSON.parse(raw);
      STATE.roster = d.roster || DEFAULTS.roster;
      STATE.medical = d.medical || DEFAULTS.medical;
      STATE.attendance = d.attendance || DEFAULTS.attendance;
      STATE.ippt = d.ippt || [];
      STATE.rm = d.rm || [];
      STATE.soc = d.soc || [];
      STATE.polar = d.polar || [];
    } else {
      STATE.roster = [...DEFAULTS.roster];
      STATE.medical = [...DEFAULTS.medical];
      STATE.attendance = [...DEFAULTS.attendance];
    }
  } catch { 
    STATE.roster = [...DEFAULTS.roster];
    STATE.medical = [...DEFAULTS.medical];
    STATE.attendance = [...DEFAULTS.attendance];
  }
}

// ═══════════════════════════════════════════════════════
// GOOGLE SHEETS API (via Apps Script)
// ═══════════════════════════════════════════════════════
const API = {
  async get(action, tab) {
    if (!STATE.apiUrl) throw new Error("No API URL configured");
    const url = `${STATE.apiUrl}?action=${action}${tab ? "&tab=" + tab : ""}`;
    const res = await fetch(url);
    return res.json();
  },
  async post(body) {
    if (!STATE.apiUrl) throw new Error("No API URL configured");
    const res = await fetch(STATE.apiUrl, {
      method: "POST",
      headers: {"Content-Type": "text/plain"}, // Apps Script requires this
      body: JSON.stringify(body)
    });
    return res.json();
  },
  async pullAll() {
    const data = await this.get("readAll");
    if (data.error) throw new Error(data.error);
    if (data.roster?.length) STATE.roster = data.roster;
    if (data.medical?.length) STATE.medical = data.medical;
    if (data.attendance?.length) STATE.attendance = data.attendance;
    if (data.ippt?.length) STATE.ippt = data.ippt;
    if (data.rm?.length) STATE.rm = data.rm;
    if (data.soc?.length) STATE.soc = data.soc;
    if (data.polar?.length) STATE.polar = data.polar;
    saveLocal();
    return data;
  },
  async pushTab(tabName, data) {
    return this.post({ action: "write", tab: tabName, data });
  },
  async appendRow(tabName, row) {
    return this.post({ action: "append", tab: tabName, row });
  }
};

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const getName = d4 => STATE.roster.find(r => r.id === d4)?.name || d4;
const getAward = s => { if(!s||s===0)return"N/A";if(s>=85)return"Gold";if(s>=75)return"Silver";if(s>=61)return"Pass";return"Fail" };
const badge = (text, cls) => `<span class="badge badge-${cls}">${text}</span>`;
const statusBadge = s => badge(s, s==="Active"?"green":s==="Warded"?"red":"orange");
const typeBadge = t => badge(t, t==="RSI"?"orange":t==="Injury"?"red":"yellow");
const awardBadge = s => { const a=getAward(s); const c={Gold:"yellow",Silver:"accent",Pass:"green",Fail:"red","N/A":"accent"}; return badge(a,c[a]||"accent") };
const pct = (a,b) => b?Math.round(a/b*100):0;

function exportCSV(data, filename) {
  const csv = Papa.unparse(data);
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}
function exportJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    STATE.nav = btn.dataset.nav;
    render();
  });
});

// ═══════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════
document.getElementById("search-input").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const res = document.getElementById("search-results");
  if (!q) { res.innerHTML = ""; return; }
  const matches = STATE.roster.filter(r => r.id.toLowerCase().includes(q) || r.name.toLowerCase().includes(q)).slice(0,5);
  res.innerHTML = matches.map(r => `<button class="btn btn-primary" style="font-size:11px;padding:4px 10px" onclick="openPerson('${r.id}')">${r.id}</button>`).join("");
});

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal(title, html) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").innerHTML = html;
  document.getElementById("modal-overlay").classList.remove("hidden");
}
function closeModal() {
  document.getElementById("modal-overlay").classList.add("hidden");
}

function openPerson(d4) {
  const p = STATE.roster.find(r=>r.id===d4); if(!p) return;
  const med = STATE.medical.filter(m=>m.d4===d4);
  const ippts = STATE.ippt.filter(i=>i.d4===d4).sort((a,b)=>a.attempt-b.attempt);
  const rms = STATE.rm.filter(r=>r.d4===d4).sort((a,b)=>a.rmNum-b.rmNum);
  const socs = STATE.soc.filter(s=>s.d4===d4).sort((a,b)=>a.socNum-b.socNum);
  
  let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px">${p.id} — P${p.plt}S${p.sect} — ${statusBadge(p.status)}</div>`;
  if(p.conditions) html += `<div style="background:#F8514922;border:1px solid #F8514944;border-radius:6px;padding:8px;margin-bottom:12px;font-size:12px;color:var(--red)">Pre-existing: ${p.conditions}</div>`;
  
  html += `<div class="stats-row"><div class="stat"><label>RSIs</label><div class="val" style="color:${med.length>1?'var(--red)':'var(--muted)'}">${med.length}</div></div>`;
  html += `<div class="stat"><label>IPPT Best</label><div class="val" style="color:var(--orange)">${ippts.length?Math.max(...ippts.map(i=>+i.score)):"—"}</div></div>`;
  html += `<div class="stat"><label>RMs</label><div class="val" style="color:var(--teal)">${rms.length}</div></div>`;
  html += `<div class="stat"><label>SOCs</label><div class="val" style="color:var(--purple)">${socs.length}</div></div></div>`;
  
  if(ippts.length) {
    html += `<h4 style="font-size:12px;color:var(--muted);margin:12px 0 8px">IPPT Progression</h4>`;
    html += `<canvas id="person-ippt-chart" height="140"></canvas>`;
    html += ippts.map(i=>`<span class="badge badge-accent" style="margin:2px">#${i.attempt}: ${i.score} ${awardBadge(i.score)}</span>`).join("");
  }
  if(rms.length) {
    html += `<h4 style="font-size:12px;color:var(--muted);margin:12px 0 8px">Route March</h4><div style="display:flex;gap:8px;flex-wrap:wrap">`;
    html += rms.map(r=>`<div style="background:var(--surface2);border-radius:6px;padding:8px 12px;border:1px solid var(--border);text-align:center"><div style="font-size:10px;color:var(--muted)">RM ${r.rmNum}</div><div class="mono" style="font-size:16px;font-weight:700;color:var(--teal)">${r.time}</div></div>`).join("");
    html += `</div>`;
  }
  if(socs.length) {
    html += `<h4 style="font-size:12px;color:var(--muted);margin:12px 0 8px">SOC</h4><div style="display:flex;gap:8px;flex-wrap:wrap">`;
    html += socs.map(s=>`<div style="background:var(--surface2);border-radius:6px;padding:8px 12px;border:1px solid var(--border);text-align:center"><div style="font-size:10px;color:var(--muted)">SOC ${s.socNum}</div><div class="mono" style="font-size:16px;font-weight:700;color:var(--purple)">${s.time}</div></div>`).join("");
    html += `</div>`;
  }
  if(med.length) {
    html += `<h4 style="font-size:12px;color:var(--muted);margin:12px 0 8px">Medical History</h4>`;
    html += med.map(m=>`<div style="background:var(--surface2);border-radius:6px;padding:6px 10px;margin-bottom:4px;border:1px solid var(--border);font-size:12px"><span style="color:var(--muted)">${m.date}</span> ${typeBadge(m.type)} ${m.reason} ${m.status?`<span style="color:var(--muted)">— ${m.status}</span>`:""}</div>`).join("");
  }
  
  openModal(p.name, html);
  
  // Draw chart after modal opens
  setTimeout(()=>{
    const canvas = document.getElementById("person-ippt-chart");
    if(canvas && ippts.length) {
      new Chart(canvas, {
        type:"line", data:{labels:ippts.map(i=>"#"+i.attempt),datasets:[{data:ippts.map(i=>+i.score),borderColor:"#D29922",backgroundColor:"#D2992233",fill:true,tension:.3,pointRadius:5}]},
        options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100,grid:{color:"#30363D"}},x:{grid:{color:"#30363D"}}}}
      });
    }
  }, 100);
}

// ═══════════════════════════════════════════════════════
// FORM HELPERS

function rosterSelect(id="form-d4") {
  return `<select id="${id}" style="padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:12px"><option value="">Select...</option>${STATE.roster.map(r=>`<option value="${r.id}">${r.id} ${r.name}</option>`).join("")}</select>`;
}
function formField(id, label, type="text", placeholder="") {
  return `<div class="form-group"><label>${label}</label><input id="${id}" type="${type}" placeholder="${placeholder}"></div>`;
}
function formSelect(id, label, options) {
  return `<div class="form-group"><label>${label}</label><select id="${id}">${options.map(o=>typeof o==="string"?`<option value="${o}">${o}</option>`:`<option value="${o[0]}">${o[1]}</option>`).join("")}</select></div>`;
}
const gv = id => document.getElementById(id)?.value || "";

function render() {
  // Destroy old charts
  Object.values(STATE.charts).forEach(c=>c.destroy());
  STATE.charts = {};
  
  const el = document.getElementById("content");
  const active = STATE.roster.filter(r=>r.status==="Active").length;
  document.getElementById("str-counter").textContent = `Str: ${STATE.roster.length} | Active: ${active}`;
  
  switch(STATE.nav) {
    case "dashboard": renderDashboard(el); break;
    case "roster": renderRoster(el); break;
    case "attendance": renderAttendance(el); break;
    case "medical": renderMedical(el); break;
    case "ippt": renderIPPT(el); break;
    case "rm": renderRM(el); break;
    case "soc": renderSOC(el); break;
    case "polar": renderPolar(el); break;
    case "sync": renderSync(el); break;
    default: el.innerHTML = "";
  }
}

// ═══════════════════════════════════════════════════════
// SYNC ACTIONS
// ═══════════════════════════════════════════════════════
function syncLog(msg, color) {
  const el = document.getElementById("sync-log");
  if(!el) return;
  const t = new Date().toLocaleTimeString();
  el.innerHTML = `<div style="color:${color||'var(--muted)'}">${t} — ${msg}</div>` + el.innerHTML;
}

function saveApiUrl() {
  STATE.apiUrl = document.getElementById("api-url-input").value.trim();
  localStorage.setItem("cougar-api-url", STATE.apiUrl);
  syncLog("API URL saved", "var(--green)");
}

async function doPing() {
  try {
    syncLog("Pinging...");
    const res = await API.get("ping");
    if(res.ok) syncLog(`Connected! Tabs: ${res.sheets?.join(", ")}`, "var(--green)");
    else syncLog(`Error: ${res.error}`, "var(--red)");
  } catch(e) { syncLog(`Failed: ${e.message}`, "var(--red)"); }
}

async function doPull() {
  try {
    syncLog("Pulling all data...");
    document.getElementById("pull-btn").disabled = true;
    const data = await API.pullAll();
    syncLog(`Pull complete! Sheet: ${data.sheetName}`, "var(--green)");
    render();
  } catch(e) { syncLog(`Pull failed: ${e.message}`, "var(--red)"); }
  finally { const b=document.getElementById("pull-btn"); if(b) b.disabled=false; }
}

async function doPushAll() {
  const tabs=[["Roster",STATE.roster],["Medical",STATE.medical],["Attendance",STATE.attendance],["IPPT",STATE.ippt],["RouteMarch",STATE.rm],["SOC",STATE.soc],["PolarFlow",STATE.polar]];
  document.getElementById("push-btn").disabled = true;
  for(const[name,data] of tabs) {
    if(data.length) {
      try { await pushTab(name, data); } catch(e) { syncLog(`${name} failed: ${e.message}`, "var(--red)"); }
    }
  }
  const b=document.getElementById("push-btn"); if(b) b.disabled=false;
}

async function pushTab(tabName, data) {
  try {
    syncLog(`Pushing ${tabName} (${data.length} rows)...`);
    const res = await API.pushTab(tabName, data);
    if(res.ok) syncLog(`${tabName}: ${res.rowsWritten} rows written ✓`, "var(--green)");
    else syncLog(`${tabName}: ${res.error}`, "var(--red)");
  } catch(e) { syncLog(`${tabName}: ${e.message}`, "var(--red)"); }
}

// CSV IMPORTERS
// ═══════════════════════════════════════════════════════
function importIPPT(input) {
  Papa.parse(input.files[0],{header:true,skipEmptyLines:true,complete:r=>{
    r.data.forEach((row,i)=>STATE.ippt.push({id:Date.now()+i,d4:row["4D"]||"",attempt:+row["Attempt"]||0,date:row["Date"]||"",pushups:+row["Push-ups"]||0,situps:+row["Sit-ups"]||0,runTime:row["2.4km"]||"",score:+row["Score"]||0}));
    saveLocal();render();
  }});input.value="";
}
function importRM(input) {
  Papa.parse(input.files[0],{header:true,skipEmptyLines:true,complete:r=>{
    r.data.forEach((row,i)=>STATE.rm.push({id:Date.now()+i,d4:row["4D"]||"",rmNum:+row["RM"]||0,date:row["Date"]||"",time:row["Time"]||"",avgHr:+row["Avg HR"]||0,maxHr:+row["Max HR"]||0,pass:row["Pass"]||"Y"}));
    saveLocal();render();
  }});input.value="";
}
function importPolar(input) {
  Papa.parse(input.files[0],{header:true,skipEmptyLines:true,complete:r=>{
    r.data.forEach((row,i)=>STATE.polar.push({id:Date.now()+i,d4:row["4D"]||"",conduct:row["Conduct"]||"",date:row["Date"]||"",avgHr:+row["Avg HR"]||0,maxHr:+row["Max HR"]||0,minHr:+row["Min HR"]||0,calories:+row["Calories"]||0,trainingLoad:+row["Training Load"]||0,duration:+row["Duration"]||0,distance:+row["Distance"]||0}));
    saveLocal();render();
  }});input.value="";
}
function importBackup(input) {
  const reader=new FileReader();
  reader.onload=e=>{try{const d=JSON.parse(e.target.result);
    if(d.roster)STATE.roster=d.roster;if(d.medical)STATE.medical=d.medical;if(d.attendance)STATE.attendance=d.attendance;
    if(d.ippt)STATE.ippt=d.ippt;if(d.rm)STATE.rm=d.rm;if(d.soc)STATE.soc=d.soc;if(d.polar)STATE.polar=d.polar;
    saveLocal();render();
  }catch(err){alert("Import failed: "+err.message)}};
  reader.readAsText(input.files[0]);input.value="";
}
