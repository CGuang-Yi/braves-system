<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Braves Company Data System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=111">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<!-- ExcelJS: reads .xlsx cell fill colours (the admin Sick-History importer needs
     fills, which PapaParse/CSV can't carry). Loaded lazily-tolerant: the importer
     checks `typeof ExcelJS` and warns if the CDN didn't load. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
</head>
<body>

<!-- LOGIN OVERLAY: covers the whole app until a valid session exists.
     Starts hidden; bootstrap() in main.js reveals it synchronously when there's
     no token, so an unauthenticated user never sees the app chrome. -->
<div id="login-overlay" class="login-overlay hidden">
  <form id="login-form" class="login-card" autocomplete="on">
    <div class="login-brand">
      <small>40 SAR</small>
      <h1>Data System</h1>
    </div>
    <p class="login-sub">Sign in with your account</p>
    <label class="login-field">Email
      <input type="email" id="login-email" autocomplete="username" required placeholder="you@unit.mil">
    </label>
    <label class="login-field">Password
      <input type="password" id="login-password" autocomplete="current-password" required placeholder="••••••••">
    </label>
    <div id="login-error" class="login-error"></div>
    <button type="submit" id="login-submit" class="btn btn-primary login-submit">Sign In</button>
  </form>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <small>40 SAR BRAVES</small>
    <h2>Data System</h2>
  </div>
  <button class="nav-btn active" data-nav="dashboard"><span>📊</span><span>Dashboard</span></button>
  <button class="nav-btn" data-nav="roster"><span>👥</span><span>Roster</span></button>
  <button class="nav-btn" data-nav="attendance"><span>📋</span><span>Attendance</span></button>
  <button class="nav-btn" data-nav="detail"><span>🔎</span><span>Detail</span></button>
  <button class="nav-btn" data-nav="medical"><span>🏥</span><span>Medical</span></button>
  <button class="nav-btn" data-nav="statusboard"><span>🗓️</span><span>Status Board</span></button>
  <button class="nav-btn" data-nav="ippt"><span>🏃</span><span>IPPT</span></button>
  <button class="nav-btn" data-nav="rm"><span>🥾</span><span>Route March</span></button>
  <button class="nav-btn" data-nav="soc"><span>🪖</span><span>SOC</span></button>
  <button class="nav-btn" data-nav="ha"><span>🌡️</span><span>Heat Acclim.</span></button>
  <button class="nav-btn" data-nav="polar"><span>⌚</span><span>Polar Flow</span></button>
  <button class="nav-btn" data-nav="leave"><span>📅</span><span>Leave / Out</span></button>
  <button class="nav-btn" data-nav="mskAnalytics"><span>📊</span><span>MSK Analytics</span></button>
  <button class="nav-btn" data-nav="conducts"><span>🏷️</span><span>Conducts</span></button>
  <button class="nav-btn admin-only" data-nav="archive"><span>🗄️</span><span>Archive</span></button>
  <button class="nav-btn" data-nav="sync"><span>🔄</span><span>Sync & I/O</span></button>
  <div id="sidebar-footer">
    <div id="account-identity"></div>
    <div id="sync-indicator">● Not synced</div>
    <div id="str-counter"></div>
  </div>
</div>

<!-- Mobile backdrop: shown when sidebar is open on phone screens; tap to close. -->
<div id="sidebar-backdrop" class="hidden"></div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <button id="mobile-nav-toggle" aria-label="Open menu">☰</button>
    <span class="topbar-search-icon">🔍</span>
    <input id="search-input" placeholder="Search 4D or Name...">
    <div id="search-results" style="display:flex;gap:4px;flex-wrap:wrap"></div>
    <button id="mobile-filter-toggle" aria-label="Open scope filter">All</button>
    <div id="topbar-filters">
      <span class="filter-label">Scope</span>
      <div id="filter-role-group" class="filter-role-group" title="Show Commanders, Recruits, or both">
        <button data-role="" class="role-btn active">All</button>
        <button data-role="Commander" class="role-btn">Cmdrs</button>
        <button data-role="Recruit" class="role-btn">Recs</button>
      </div>
      <select id="filter-plt" class="topbar-select" title="Filter by platoon"></select>
      <select id="filter-sect" class="topbar-select" title="Filter by section"></select>
      <button id="filter-clear" class="btn btn-icon" title="Clear filter" style="display:none">✕</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!--
  Plain scripts (not modules) so this works under file:// too.
  Load order matters: state → api → ippt-scoring → helpers → sick-history-import →
  render → forms → braves-parade → sync → main. sick-history-import is a DOM-free
  pure parser (used by the admin xlsx importer in forms); load it before forms.
-->
<script src="js/state.js?v=111"></script>
<script src="js/api.js?v=111"></script>
<script src="js/ippt-scoring.js?v=111"></script>
<script src="js/helpers.js?v=111"></script>
<script src="js/sick-history-import.js?v=111"></script>
<script src="js/render.js?v=111"></script>
<script src="js/forms.js?v=111"></script>
<script src="js/braves-parade.js?v=111"></script>
<script src="js/sync.js?v=111"></script>
<script src="js/main.js?v=111"></script>
</body>
</html>
